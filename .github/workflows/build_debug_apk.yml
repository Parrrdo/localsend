name: Build Release APK

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.35.6"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Remove proprietary dependencies
        run: sh scripts/remove_proprietary_dependencies.sh || true

      - name: Decode key.properties file
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEY_PROPERTIES }}
        run: printf '%s' "$ENCODED_STRING" | base64 -d > app/android/key.properties

      - name: Decode android-keystore.jks file
        env:
          ENCODED_STRING: ${{ secrets.ANDROID_KEY_STORE }}
        run: mkdir -p secrets && printf '%s' "$ENCODED_STRING" | base64 -d > secrets/android-keystore.jks

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Release APK (split-per-abi)
        working-directory: app
        run: flutter build apk --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v6
        with:
          name: localsend-apk-release
          path: |
            app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            app/build/app/outputs/flutter-apk/app-x86_64-release.apk
